name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production & Stop Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 120s
          script: |
            echo "=========================================="
            echo "  PRODUCTION DEPLOY — tingatalk-backend"
            echo "=========================================="

            cd /var/www/tingatalk-backend

            echo ">> Pulling latest main..."
            git fetch origin main
            git reset --hard origin/main

            echo ">> Installing dependencies..."
            npm install --production

            echo ">> Restarting production..."
            pm2 restart tingatalk-backend || pm2 start ecosystem.config.cjs --env production

            sleep 3

            echo ">> Health check..."
            curl -sf http://localhost:3000/api/health | python3 -m json.tool || echo "Health check failed!"

            # Stop staging if branches are now in sync (main was updated = branch was merged)
            echo ">> Checking if staging should be stopped..."
            PROD_COMMIT=$(cd /var/www/tingatalk-backend && git rev-parse HEAD)
            STAGE_COMMIT=$(cd /var/www/tingatalk-new && git fetch origin feature/modular-backend 2>/dev/null && git rev-parse origin/feature/modular-backend 2>/dev/null || echo "none")

            if [ "$PROD_COMMIT" = "$STAGE_COMMIT" ]; then
              echo ">> Branches in sync — stopping staging to save resources..."
              pm2 stop tingatalk-staging 2>/dev/null || true
            else
              echo ">> Staging branch has diverged — keeping staging alive."
            fi

            pm2 save

            echo "=========================================="
            echo "  Production deployed!"
            echo "  https://api.tingatalk.in"
            echo "=========================================="
            pm2 status
